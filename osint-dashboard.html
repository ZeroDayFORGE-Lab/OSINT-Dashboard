<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSINT Arsenal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10;
    --surface: #0d1117;
    --card: #111820;
    --border: #1e3040;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --accent3: #39ff14;
    --text: #c9d8e8;
    --text-dim: #5a7a90;
    --text-bright: #e8f4ff;
    --glow: 0 0 20px rgba(0,212,255,0.3);
    --glow2: 0 0 20px rgba(57,255,20,0.2);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,212,255,0.015) 2px,
      rgba(0,212,255,0.015) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  /* Grid background */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper { position: relative; z-index: 1; }

  /* Header */
  header {
    padding: 2rem 2rem 1rem;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(0,212,255,0.05) 0%, transparent 100%);
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }
  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 2rem;
    flex-wrap: wrap;
  }
  .logo {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.6rem;
    color: var(--accent);
    text-shadow: var(--glow);
    letter-spacing: 0.1em;
    white-space: nowrap;
  }
  .logo span { color: var(--accent2); }
  .tagline {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .stats-bar {
    margin-left: auto;
    display: flex;
    gap: 1.5rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-dim);
  }
  .stat { display: flex; flex-direction: column; align-items: center; gap: 0.2rem; }
  .stat-num { font-size: 1.1rem; color: var(--accent3); text-shadow: var(--glow2); }

  /* Search & Filter */
  .controls {
    max-width: 1400px;
    margin: 1.5rem auto;
    padding: 0 2rem;
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 240px;
  }
  .search-wrap::before {
    content: '⌕';
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--accent);
    font-size: 1.1rem;
    pointer-events: none;
  }
  input[type="text"] {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text-bright);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    padding: 0.6rem 1rem 0.6rem 2.5rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    border-radius: 2px;
  }
  input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: var(--glow);
  }
  .filter-btns {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .filter-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    padding: 0.45rem 0.8rem;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    border-radius: 2px;
  }
  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: var(--glow);
    background: rgba(0,212,255,0.07);
  }

  /* Main grid */
  main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 2rem 4rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1.2rem;
  }

  /* Category card */
  .category {
    background: var(--card);
    border: 1px solid var(--border);
    border-top: 2px solid var(--accent);
    transition: border-color 0.2s, transform 0.2s;
    animation: fadeUp 0.4s ease both;
  }
  .category:nth-child(even) { border-top-color: var(--accent2); }
  .category:nth-child(3n) { border-top-color: var(--accent3); }
  .category:hover {
    border-color: rgba(0,212,255,0.4);
    transform: translateY(-2px);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .cat-header {
    padding: 0.8rem 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }
  .cat-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-bright);
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }
  .cat-icon { font-size: 0.9rem; }
  .cat-count {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-dim);
    background: var(--surface);
    padding: 0.15rem 0.45rem;
    border: 1px solid var(--border);
  }
  .cat-toggle { color: var(--text-dim); font-size: 0.7rem; transition: transform 0.2s; }
  .category.collapsed .cat-toggle { transform: rotate(-90deg); }

  .cat-body { padding: 0.5rem 0; }
  .category.collapsed .cat-body { display: none; }

  /* Subcategory */
  .subcat-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent2);
    padding: 0.6rem 1rem 0.25rem;
    opacity: 0.7;
  }

  /* Tool link */
  .tool-link {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.45rem 1rem;
    color: var(--text);
    text-decoration: none;
    font-size: 0.82rem;
    transition: background 0.15s, color 0.15s, padding-left 0.15s;
    border-left: 2px solid transparent;
  }
  .tool-link:hover {
    background: rgba(0,212,255,0.06);
    color: var(--accent);
    padding-left: 1.3rem;
    border-left-color: var(--accent);
  }
  .tool-link .dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--text-dim);
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .tool-link:hover .dot { background: var(--accent); }
  .tool-link .badge {
    margin-left: auto;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.55rem;
    padding: 0.1rem 0.35rem;
    border: 1px solid;
    border-radius: 1px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .badge.new { color: var(--accent3); border-color: var(--accent3); }
  .badge.free { color: #aaa; border-color: #333; }

  /* hidden by search */
  .tool-link.hidden { display: none; }
  .category.all-hidden { display: none; }

  /* Footer */
  footer {
    text-align: center;
    padding: 2rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    border-top: 1px solid var(--border);
    position: relative;
    z-index: 1;
  }
</style>
</head>

</div>

<main id="main"></main>

// ── Build DOM ─────────────────────────────────────────────
const main = document.getElementById('main');
let totalTools = 0;
let newTools = 0;

DATA.forEach((cat, ci) => {
  const card = document.createElement('div');
  card.className = 'category';
  card.dataset.filter = cat.filter;
  card.dataset.id = cat.id;

  const toolCount = cat.tools.length;
  totalTools += toolCount;

  let bodyHTML = '<div class="cat-body">';
  let lastSub = null;
  cat.tools.forEach(t => {
    if (t.badge === 'new') newTools++;
    if (t.sub && t.sub !== lastSub) {
      bodyHTML += `<div class="subcat-label">— ${t.sub}</div>`;
      lastSub = t.sub;
    }
    const badge = t.badge ? `<span class="badge ${t.badge}">${t.badge}</span>` : '';
    bodyHTML += `<a class="tool-link" href="${t.url}" target="_blank" rel="noopener" data-name="${t.name.toLowerCase()}">
      <span class="dot"></span>${t.name}${badge}
    </a>`;
  });
  bodyHTML += '</div>';

  card.innerHTML = `
    <div class="cat-header">
      <span class="cat-title">
        <span class="cat-icon">${cat.icon}</span>
        ${cat.title}
      </span>
      <span style="display:flex;align-items:center;gap:.5rem">
        <span class="cat-count">${toolCount}</span>
        <span class="cat-toggle">▾</span>
      </span>
    </div>
    ${bodyHTML}
  `;

  card.querySelector('.cat-header').addEventListener('click', () => {
    card.classList.toggle('collapsed');
  });

  main.appendChild(card);
});

document.getElementById('total-count').textContent = totalTools;
document.getElementById('cat-count').textContent = DATA.length;
document.getElementById('new-count').textContent = newTools;

// ── Filter ────────────────────────────────────────────────
const filterBtns = document.querySelectorAll('.filter-btn');
let activeFilter = 'all';

filterBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    filterBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    applyFilters();
  });
});

// ── Search ────────────────────────────────────────────────
const searchInput = document.getElementById('search');
searchInput.addEventListener('input', applyFilters);

function applyFilters() {
  const query = searchInput.value.toLowerCase().trim();
  document.querySelectorAll('.category').forEach(card => {
    const matchesFilter = activeFilter === 'all' || card.dataset.filter === activeFilter;
    if (!matchesFilter) { card.classList.add('all-hidden'); return; }

    const links = card.querySelectorAll('.tool-link');
    let visibleCount = 0;
    links.forEach(link => {
      const matches = !query || link.dataset.name.includes(query);
      link.classList.toggle('hidden', !matches);
      if (matches) visibleCount++;
    });
    card.classList.toggle('all-hidden', visibleCount === 0);
    if (query && visibleCount > 0) card.classList.remove('collapsed');
  });
}
